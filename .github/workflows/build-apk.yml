name: Build V2 HHT APK

on:
  push:
    branches: [ main, HHT-Dev ]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/V2Retail_keystore
          ls -lh /tmp/V2Retail_keystore

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: /tmp/V2Retail_keystore
          KEYSTORE_PASSWORD: V2Retail@456
          KEY_ALIAS: v2retail
          KEY_PASSWORD: V2Retail@456
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        run: |
          find app/build/outputs/apk -name '*.apk'
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "APK: $APK"
          echo "Size: $(du -sh $APK)"
          cp "$APK" V2_HHT_Azure_Release.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: V2-HHT-Azure-Release
          path: V2_HHT_Azure_Release.apk

      - name: Get version name
        id: version
        run: |
          VER=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"

      - name: Set release info (main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "TAG=v${{ steps.version.outputs.version }}-build${{ github.run_number }}" >> $GITHUB_ENV
          echo "RELEASE_NAME=V2 HHT v${{ steps.version.outputs.version }} Build ${{ github.run_number }}" >> $GITHUB_ENV
          echo "PRERELEASE=false" >> $GITHUB_ENV
          echo "RELEASE_BODY=Version: ${{ steps.version.outputs.version }}\nBuild: ${{ github.run_number }}\nCommit: ${{ github.sha }}\nBranch: main (Production)" >> $GITHUB_ENV

      - name: Set release info (HHT-Dev branch)
        if: github.ref == 'refs/heads/HHT-Dev'
        run: |
          echo "TAG=v${{ steps.version.outputs.version }}-build${{ github.run_number }}-DEV" >> $GITHUB_ENV
          echo "RELEASE_NAME=[DEV] V2 HHT v${{ steps.version.outputs.version }} Build ${{ github.run_number }}" >> $GITHUB_ENV
          echo "PRERELEASE=true" >> $GITHUB_ENV
          echo "RELEASE_BODY=Version: ${{ steps.version.outputs.version }}\nBuild: ${{ github.run_number }}\nCommit: ${{ github.sha }}\nBranch: HHT-Dev (SAP DEV - 192.168.144.174 / Client 210 / BATCHUSER)\nEndpoint: https://v2-hht-api.azurewebsites.net/api/hht?env=dev\n\nDEV BUILD - For testing only. Do NOT deploy to production stores." >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ env.PRERELEASE }}
          body: ${{ env.RELEASE_BODY }}
          files: V2_HHT_Azure_Release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
