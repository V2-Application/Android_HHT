name: Build V2 HHT APK

on:
  push:
    branches: [ main, ui-redesign ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/V2Retail_keystore
          ls -lh /tmp/V2Retail_keystore

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: /tmp/V2Retail_keystore
          KEYSTORE_PASSWORD: V2Retail@456
          KEY_ALIAS: v2retail
          KEY_PASSWORD: V2Retail@456
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          cp "$APK" V2_HHT_Azure_Release.apk

      - name: Get version name
        id: version
        run: |
          VER=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          BRANCH="${GITHUB_REF##*/}"
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: V2-HHT-${{ steps.version.outputs.branch }}-${{ steps.version.outputs.version }}
          path: V2_HHT_Azure_Release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ steps.version.outputs.branch }}-build${{ github.run_number }}
          name: 'V2 HHT v${{ steps.version.outputs.version }} (${{ steps.version.outputs.branch }}) Build ${{ github.run_number }}'
          body: |
            Branch: ${{ steps.version.outputs.branch }}
            Version: ${{ steps.version.outputs.version }}
            Build: ${{ github.run_number }}
            Commit: ${{ github.sha }}
          files: V2_HHT_Azure_Release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
